<script>
  (()=>{
    const s = localStorage.getItem('theme');
    const d = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
    const t = s || d;
    document.documentElement.setAttribute('data-theme', t);
    document.getElementById('meta-theme-color').setAttribute('content', t === 'dark' ? '#000000' : '#ffffff');
  })();
</script>
<style>
  :root {
    --bg: #ffffff;
    --text-primary: rgba(0, 0, 0, 0.92);
    --text-secondary: rgba(0, 0, 0, 0.65);
    --text-tertiary: rgba(0, 0, 0, 0.55);
    --vignette: #ffffff;
    --accent: #F36523;
    --icon-halo: rgba(243, 101, 35, 0.20);
    --theme-ease: cubic-bezier(0.25, 1, 0.5, 1);
    --theme-duration: 2.2s;
  }
  [data-theme="dark"] {
    --bg: #000000;
    --text-primary: rgba(255, 255, 255, 0.92);
    --text-secondary: rgba(255, 255, 255, 0.60);
    --text-tertiary: rgba(255, 255, 255, 0.45);
    --vignette: #000000;
    --accent: #FF7A3D;
    --icon-halo: rgba(255, 122, 61, 0.15);
  }
  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    min-height: 100dvh;
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overscroll-behavior: none;
    transition: background-color var(--theme-duration) var(--theme-ease), color var(--theme-duration) var(--theme-ease);
  }
  #resonance-field {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
    pointer-events: auto;
    opacity: 0;
    transition: opacity 3s var(--theme-ease);
  }
  body.ready #resonance-field {
    opacity: 1;
  }
  .vignette {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 2;
    background: radial-gradient(circle at center, transparent 30%, var(--vignette) 120%);
    pointer-events: none;
    transition: background var(--theme-duration) var(--theme-ease);
  }
  main {
    position: relative;
    z-index: 10;
    width: 100%;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 0 5vw;
    pointer-events: none;
  }
  .theme-toggle {
    position: fixed;
    top: clamp(1.5rem, 4vh, 2.5rem);
    right: clamp(1.5rem, 4vw, 2.5rem);
    z-index: 20;
    background: transparent;
    border: none;
    color: var(--text-secondary);
    cursor: pointer;
    padding: 0.75rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.4s ease;
    opacity: 0;
  }
  .theme-toggle:hover { color: var(--text-primary); }
  .theme-toggle svg { width: 22px; height: 22px; }
  [data-theme="dark"] .icon-moon { display: none; }
  [data-theme="light"] .icon-sun { display: none; }
  .logo, h1, p.sub, .status-badge, footer {
    opacity: 0;
  }
  .logo {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.85rem;
    font-weight: 600;
    font-size: 1.1rem;
    letter-spacing: -0.04em;
    color: var(--text-primary);
    margin-bottom: 6vh;
  }
  .logo-icon {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(44px, 6vw, 72px);
  }
  .logo-icon::before {
    content: '';
    position: absolute;
    inset: -55%;
    background: radial-gradient(circle, var(--icon-halo) 0%, transparent 70%);
    filter: blur(0.25em);
    z-index: -1;
    opacity: 0.6;
    animation: haloPulse 6s ease-in-out 1.8s infinite alternate both;
    transition: background var(--theme-duration) var(--theme-ease);
  }
  .logo img {
    width: 1em;
    height: 1em;
    object-fit: contain;
    will-change: transform, filter;
    filter: drop-shadow(0 4px 24px rgba(243, 101, 35, 0.15)) drop-shadow(0 0 8px rgba(255, 200, 67, 0.05));
    animation: ambientResonance 6s ease-in-out 1.8s infinite alternate both;
  }
  .logo span {
    color: var(--accent);
    transition: color var(--theme-duration) var(--theme-ease);
  }
  h1 {
    font-weight: 300;
    font-size: clamp(2.5rem, 7vw, 6.5rem);
    line-height: 1.05;
    letter-spacing: -0.04em;
    margin: 0 0 clamp(1.25rem, 3vh, 2rem) 0;
  }
  h1 em {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-weight: 400;
    font-size: 1.1em;
    color: var(--text-primary);
    padding-right: 0.05em;
  }
  p.sub {
    font-weight: 400;
    font-size: clamp(1rem, 1.5vw, 1.25rem);
    line-height: 1.6;
    letter-spacing: -0.01em;
    color: var(--text-secondary);
    max-width: 480px;
    margin: 0 0 6vh 0;
    transition: color var(--theme-duration) var(--theme-ease);
  }
  .status-badge {
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    font-weight: 400;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--text-tertiary);
    transition: color var(--theme-duration) var(--theme-ease);
  }
  footer {
    position: fixed;
    bottom: max(2.5rem, env(safe-area-inset-bottom));
    left: 0;
    right: 0;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.4rem;
  }
  footer a {
    font-size: 0.85rem;
    letter-spacing: -0.01em;
    color: var(--text-tertiary);
    text-decoration: none;
    pointer-events: auto;
    transition: color 0.4s ease;
    padding: 0.25rem 1rem;
  }
  footer a:hover {
    color: var(--text-primary);
  }
  .legal {
    font-size: 0.7rem;
    letter-spacing: 0.02em;
    color: var(--text-tertiary);
    opacity: 0.6;
    pointer-events: none;
  }
  body.ready .logo { animation: cinematicReveal 1.6s var(--theme-ease) 0.1s forwards; }
  body.ready h1 { animation: cinematicReveal 1.6s var(--theme-ease) 0.25s forwards; }
  body.ready p.sub { animation: cinematicReveal 1.6s var(--theme-ease) 0.4s forwards; }
  body.ready .status-badge { animation: cinematicReveal 1.6s var(--theme-ease) 0.55s forwards; }
  body.ready footer { animation: cinematicReveal 1.6s var(--theme-ease) 0.7s forwards; }
  body.ready .theme-toggle { animation: cinematicReveal 1.6s var(--theme-ease) 0.85s forwards; }
  
  @media (max-height: 500px) {
    main { height: auto; min-height: 100dvh; padding: 12vh 5vw 15vh 5vw; }
    footer { position: absolute; bottom: 1.5rem; }
  }

  @keyframes cinematicReveal {
    0% { opacity: 0; filter: blur(12px); transform: translateY(16px) scale(0.98); }
    100% { opacity: 1; filter: blur(0); transform: translateY(0) scale(1); }
  }
  @keyframes ambientResonance {
    0% { transform: scale(1); filter: drop-shadow(0 4px 24px rgba(243, 101, 35, 0.15)) drop-shadow(0 0 8px rgba(255, 200, 67, 0.05)); }
    100% { transform: scale(1.03); filter: drop-shadow(0 8px 32px rgba(243, 101, 35, 0.35)) drop-shadow(0 0 16px rgba(255, 200, 67, 0.15)); }
  }
  @keyframes haloPulse {
    0% { opacity: 0.6; transform: scale(1); }
    100% { opacity: 1; transform: scale(1.1); }
  }
  @media (prefers-reduced-motion: reduce) {
    .logo img, .logo-icon::before { animation: none; }
    body.ready .logo, body.ready h1, body.ready p.sub, body.ready .status-badge, body.ready footer, body.ready .theme-toggle {
      animation: none;
      opacity: 1;
    }
  }
</style>
</head>
<body>
  <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
    </svg>
    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
    </svg>
  </button>
  <canvas id="resonance-field" aria-hidden="true"></canvas>
  <div class="vignette" aria-hidden="true"></div>
  <main>
    <div class="logo">
      <div class="logo-icon">
        <img src="icon.svg" alt="Rssonate">
      </div>
      <div>rssonate<span>.</span></div>
    </div>
    <h1>An RSS reader to<br><em>deprecate</em> them all.</h1>
    <p class="sub">Private. Powerful. Personal.</p>
    <div class="status-badge">Coming Soon</div>
  </main>
  <footer>
    <a href="mailto:rssonate@proton.me">rssonate@proton.me</a>
    <div class="legal">&copy; 2026 Rssonate.</div>
  </footer>
  <script>
    (() => {
      const themeToggleBtn = document.getElementById('theme-toggle');
      const metaThemeColor = document.getElementById('meta-theme-color');
      let tR = 255, tG = 250, tB = 245, cR = 255, cG = 250, cB = 245;

      const applyThemeVars = (theme) => {
        const isDark = theme === 'dark';
        tR = isDark ? 255 : 0;
        tG = isDark ? 250 : 0;
        tB = isDark ? 245 : 0;
      };

      const setTheme = (theme) => {
        document.documentElement.setAttribute('data-theme', theme);
        metaThemeColor.setAttribute('content', theme === 'dark' ? '#000000' : '#ffffff');
        localStorage.setItem('theme', theme);
        applyThemeVars(theme);
      };

      applyThemeVars(document.documentElement.getAttribute('data-theme'));
      cR = tR; cG = tG; cB = tB;

      themeToggleBtn.addEventListener('click', () => {
        setTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
      });

      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
        if (!localStorage.getItem('theme')) setTheme(e.matches ? 'dark' : 'light');
      });

      const canvas = document.getElementById('resonance-field');
      const ctx = canvas.getContext('2d', { alpha: true });

      let width, height, strings = [], animationFrameId, resizeTimeout;
      let isVisible = true, isSleeping = false;
      const NUM_STRINGS = 55, RESOLUTION = 30, TENSION = 0.035, DAMPING = 0.92, SPREAD = 0.15, MOUSE_FORCE = 4.0, PHYSICS_STEP = 1000 / 120;
      let mouseRadius = 150;
      const mouse = { x: -1000, y: -1000 }, lastMouse = { x: -1000, y: -1000 };

      class StringPoint {
        constructor(x, y) {
          this.x = x; this.baseY = y; this.y = y; this.vy = 0;
        }
      }

      const init = () => {
        strings = [];
        const numPoints = Math.ceil(width / RESOLUTION) + 2;
        const spacingY = height / NUM_STRINGS;
        mouseRadius = Math.max(Math.min(width, height) * 0.2, 120);
        for (let i = 0; i < NUM_STRINGS; i++) {
          const pts = [];
          for (let j = 0; j < numPoints; j++) pts.push(new StringPoint(j * RESOLUTION - RESOLUTION, i * spacingY));
          strings.push({ points: pts, leftDeltas: new Float32Array(numPoints), rightDeltas: new Float32Array(numPoints) });
        }
      };

      const wakePhysics = () => {
        if (isSleeping) {
          isSleeping = false;
          lastTime = performance.now();
          animationFrameId = requestAnimationFrame(animate);
        }
      };

      const updatePhysics = () => {
        let maxV = 0;
        for (let i = 0; i < strings.length; i++) {
          const pts = strings[i].points;
          for (let j = 0; j < pts.length; j++) {
            const p = pts[j];
            const dist = Math.hypot(mouse.x - p.x, mouse.y - p.baseY);
            if (dist < mouseRadius) {
              const force = (mouseRadius - dist) / mouseRadius;
              let mouseSpeedY = Math.max(-20, Math.min(20, mouse.y - lastMouse.y));
              if (Math.abs(mouseSpeedY) > 0.5) p.vy += (mouseSpeedY * force * 0.15);
              else p.vy += ((mouse.y - p.baseY) > 0 ? -1 : 1) * force * MOUSE_FORCE * 0.15;
            }
            p.vy -= (p.y - p.baseY) * TENSION;
            p.vy *= DAMPING;
            if (Math.abs(p.vy) > maxV) maxV = Math.abs(p.vy);
          }
        }
        for (let i = 0; i < strings.length; i++) {
          const { points, leftDeltas, rightDeltas } = strings[i];
          const len = points.length;
          for (let iter = 0; iter < 2; iter++) {
            for (let j = 0; j < len; j++) {
              if (j > 0) leftDeltas[j] = SPREAD * (points[j - 1].y - points[j].y);
              if (j < len - 1) rightDeltas[j] = SPREAD * (points[j + 1].y - points[j].y);
            }
            for (let j = 0; j < len; j++) {
              points[j].vy += leftDeltas[j] + rightDeltas[j];
              points[j].y += points[j].vy;
            }
          }
        }
        if (maxV < 0.02 && mouse.x === -1000) isSleeping = true;
      };

      const render = () => {
        ctx.clearRect(0, 0, width, height);
        cR += (tR - cR) * 0.015; cG += (tG - cG) * 0.015; cB += (tB - cB) * 0.015;
        ctx.strokeStyle = `rgba(${Math.round(cR)}, ${Math.round(cG)}, ${Math.round(cB)}, 0.08)`;
        ctx.lineWidth = 1.5;
        for (let i = 0; i < strings.length; i++) {
          const pts = strings[i].points;
          ctx.beginPath();
          ctx.moveTo(pts[0].x, pts[0].y);
          for (let j = 1; j < pts.length - 1; j++) {
            ctx.quadraticCurveTo(pts[j].x, pts[j].y, (pts[j].x + pts[j + 1].x) / 2, (pts[j].y + pts[j + 1].y) / 2);
          }
          ctx.lineTo(pts[pts.length - 1].x, pts[pts.length - 1].y);
          ctx.stroke();
        }
      };

      let lastTime = performance.now(), accumulator = 0;

      const animate = (time) => {
        if (!isVisible || isSleeping) return;
        let dt = time - lastTime;
        if (dt > 100) dt = PHYSICS_STEP;
        lastTime = time;
        accumulator += dt;
        while (accumulator >= PHYSICS_STEP) {
          updatePhysics();
          accumulator -= PHYSICS_STEP;
        }
        render();
        lastMouse.x = mouse.x; lastMouse.y = mouse.y;
        animationFrameId = requestAnimationFrame(animate);
      };

      const resize = () => {
        const dpr = window.devicePixelRatio || 1;
        width = window.innerWidth; height = window.innerHeight;
        canvas.width = width * dpr; canvas.height = height * dpr;
        ctx.scale(dpr, dpr);
        init();
        if (!isVisible || isSleeping) render();
      };

      const setMouseParams = (x, y, isStart = false) => {
        if (isStart) { lastMouse.x = x; lastMouse.y = y; }
        mouse.x = x; mouse.y = y;
        wakePhysics();
      };

      const clearMouse = () => setMouseParams(-1000, -1000, true);

      window.addEventListener('mousemove', (e) => setMouseParams(e.clientX, e.clientY));
      window.addEventListener('touchstart', (e) => setMouseParams(e.touches[0].clientX, e.touches[0].clientY, true), { passive: true });
      window.addEventListener('touchmove', (e) => setMouseParams(e.touches[0].clientX, e.touches[0].clientY), { passive: true });
      window.addEventListener('mouseleave', clearMouse);
      window.addEventListener('touchend', clearMouse);
      window.addEventListener('touchcancel', clearMouse);
      window.addEventListener('resize', () => { clearTimeout(resizeTimeout); resizeTimeout = setTimeout(resize, 150); });
      
      document.addEventListener('visibilitychange', () => {
        isVisible = document.visibilityState === 'visible';
        if (isVisible) {
          lastTime = performance.now();
          cancelAnimationFrame(animationFrameId);
          if (!isSleeping) animationFrameId = requestAnimationFrame(animate);
        } else {
          cancelAnimationFrame(animationFrameId);
        }
      });

      const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)');
      if (prefersReducedMotion.matches) isSleeping = true;
      prefersReducedMotion.addEventListener('change', (e) => {
        if (e.matches) { isSleeping = true; clearMouse(); } else wakePhysics();
      });

      resize();
      animationFrameId = requestAnimationFrame(animate);

      const startApp = () => {
        document.body.classList.add('ready');
        if (!prefersReducedMotion.matches) {
          setTimeout(() => {
            const cx = width / 2, cy = height / 2;
            lastMouse.x = cx; lastMouse.y = cy - 150; mouse.x = cx; mouse.y = cy;
            wakePhysics();
            setTimeout(clearMouse, 200);
          }, 400);
        }
      };

      const fontPromise = document.fonts ? document.fonts.ready : Promise.resolve();
      const timeoutPromise = new Promise(resolve => setTimeout(resolve, 2500));
      Promise.race([fontPromise, timeoutPromise]).then(startApp).catch(startApp);
    })();
  </script>
</body>
