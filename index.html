<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>rssonate.</title>
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;600&family=Instrument+Serif:ital@1&display=swap">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;600&family=Instrument+Serif:ital@1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #000000;
    --text-primary: rgba(255, 255, 255, 0.92);
    --text-secondary: rgba(255, 255, 255, 0.60);
    --text-tertiary: rgba(255, 255, 255, 0.35);
  }
  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overscroll-behavior: none;
    overflow: hidden;
  }
  #resonance-field {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100dvh;
    z-index: 1;
    pointer-events: auto;
    touch-action: none;
    opacity: 0;
    transition: opacity 3s cubic-bezier(0.22, 1, 0.36, 1);
  }
  body.fonts-loaded #resonance-field {
    opacity: 1;
  }
  .vignette {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100dvh;
    z-index: 2;
    background: radial-gradient(circle at center, transparent 30%, #000000 120%);
    pointer-events: none;
  }
  main {
    position: relative;
    z-index: 10;
    width: 100%;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 0 5vw;
    pointer-events: none;
  }
  .text-glow {
    text-shadow: 0 4px 24px rgba(0, 0, 0, 1), 0 2px 8px rgba(0, 0, 0, 0.6);
    will-change: transform, opacity, filter;
  }
  .logo, h1, p.sub, .status-badge, footer {
    opacity: 0;
  }
  .logo {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.85rem;
    font-weight: 600;
    font-size: 1.1rem;
    letter-spacing: -0.04em;
    color: var(--text-primary);
    margin-bottom: 6vh;
  }
  .logo img {
    width: 56px; 
    height: 56px;
    object-fit: contain;
    will-change: transform, filter;
    filter: drop-shadow(0 4px 24px rgba(243, 101, 35, 0.15)) drop-shadow(0 0 8px rgba(255, 200, 67, 0.05));
    animation: ambientResonance 6s ease-in-out 1.8s infinite alternate;
  }
  .logo span {
    color: var(--text-tertiary);
  }
  h1 {
    font-weight: 300;
    font-size: clamp(2.5rem, 7vw, 6.5rem);
    line-height: 1.05;
    letter-spacing: -0.04em;
    margin: 0 0 clamp(1.25rem, 3vh, 2rem) 0;
  }
  h1 em {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-weight: 400;
    font-size: 1.1em;
    color: var(--text-primary);
    padding-right: 0.05em;
  }
  p.sub {
    font-weight: 400;
    font-size: clamp(1rem, 1.5vw, 1.25rem);
    line-height: 1.6;
    letter-spacing: -0.01em;
    color: var(--text-secondary);
    max-width: 480px;
    margin: 0 0 6vh 0;
  }
  .status-badge {
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    font-weight: 400;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--text-tertiary);
  }
  footer {
    position: fixed;
    bottom: max(2.5rem, env(safe-area-inset-bottom));
    left: 0;
    right: 0;
    z-index: 10;
    text-align: center;
  }
  footer a {
    font-size: 0.85rem;
    letter-spacing: -0.01em;
    color: var(--text-tertiary);
    text-decoration: none;
    pointer-events: auto;
    transition: color 0.4s ease;
    padding: 10px;
  }
  footer a:hover {
    color: var(--text-primary);
  }

  body.fonts-loaded .logo { animation: cinematicReveal 1.6s cubic-bezier(0.22, 1, 0.36, 1) 0.1s forwards; }
  body.fonts-loaded h1 { animation: cinematicReveal 1.6s cubic-bezier(0.22, 1, 0.36, 1) 0.25s forwards; }
  body.fonts-loaded p.sub { animation: cinematicReveal 1.6s cubic-bezier(0.22, 1, 0.36, 1) 0.4s forwards; }
  body.fonts-loaded .status-badge { animation: cinematicReveal 1.6s cubic-bezier(0.22, 1, 0.36, 1) 0.55s forwards; }
  body.fonts-loaded footer { animation: cinematicReveal 1.6s cubic-bezier(0.22, 1, 0.36, 1) 0.7s forwards; }

  @keyframes cinematicReveal {
    0% { 
      opacity: 0; 
      filter: blur(12px);
      transform: translateY(16px) scale(0.98); 
    }
    100% { 
      opacity: 1; 
      filter: blur(0);
      transform: translateY(0) scale(1); 
    }
  }
  @keyframes ambientResonance {
    0% {
      transform: scale(1);
      filter: drop-shadow(0 4px 24px rgba(243, 101, 35, 0.15)) drop-shadow(0 0 8px rgba(255, 200, 67, 0.05));
    }
    100% {
      transform: scale(1.03);
      filter: drop-shadow(0 8px 32px rgba(243, 101, 35, 0.35)) drop-shadow(0 0 16px rgba(255, 200, 67, 0.15));
    }
  }
</style>
</head>
<body>
  <canvas id="resonance-field" aria-hidden="true"></canvas>
  <div class="vignette" aria-hidden="true"></div>
  <main>
    <div class="logo text-glow">
      <img src="icon.svg" alt="rssonate">
      <div>rssonate<span>.</span></div>
    </div>
    <h1 class="text-glow">An RSS reader to<br><em>deprecate</em> them all.</h1>
    <p class="sub text-glow">No noise. No manipulation. Zero bloat.</p>
    <div class="status-badge text-glow">Coming Soon</div>
  </main>
  <footer>
    <a href="mailto:rssonate@proton.me">rssonate@proton.me</a>
  </footer>
  <script>
    (() => {
      const canvas = document.getElementById('resonance-field');
      const ctx = canvas.getContext('2d', { alpha: false });

      let width, height;
      let strings = [];
      let isVisible = true;
      let animationFrameId;
      
      const NUM_STRINGS = 55;
      const RESOLUTION = 30;
      const TENSION = 0.035;
      const DAMPING = 0.92;
      const SPREAD = 0.15;
      const MOUSE_FORCE = 4.0;
      const PHYSICS_STEP = 1000 / 60;
      
      let mouseRadius = 150;
      const mouse = { x: -1000, y: -1000 };
      const lastMouse = { x: -1000, y: -1000 };

      class StringPoint {
        constructor(x, y) {
          this.x = x;
          this.baseY = y;
          this.y = y;
          this.vy = 0;
        }
      }

      const init = () => {
        strings = [];
        const numPoints = Math.ceil(width / RESOLUTION) + 2;
        const spacingY = height / NUM_STRINGS;
        
        mouseRadius = Math.max(Math.min(width, height) * 0.2, 120);

        for (let i = 0; i < NUM_STRINGS; i++) {
          const pts = [];
          const yPos = i * spacingY;
          for (let j = 0; j < numPoints; j++) {
            pts.push(new StringPoint(j * RESOLUTION - RESOLUTION, yPos));
          }
          
          strings.push({
            points: pts,
            leftDeltas: new Float32Array(numPoints),
            rightDeltas: new Float32Array(numPoints)
          });
        }
      };

      const updatePhysics = () => {
        for (let i = 0; i < strings.length; i++) {
          const pts = strings[i].points;
          for (let j = 0; j < pts.length; j++) {
            const p = pts[j];
            const dx = mouse.x - p.x;
            const dy = mouse.y - p.baseY;
            const dist = Math.hypot(dx, dy);

            if (dist < mouseRadius) {
              const force = (mouseRadius - dist) / mouseRadius;
              let mouseSpeedY = mouse.y - lastMouse.y;
              mouseSpeedY = Math.max(-20, Math.min(20, mouseSpeedY));
              
              if (Math.abs(mouseSpeedY) > 0.5) {
                p.vy += (mouseSpeedY * force * 0.15);
              } else {
                p.vy += (dy > 0 ? -1 : 1) * force * MOUSE_FORCE * 0.15;
              }
            }

            p.vy -= (p.y - p.baseY) * TENSION;
            p.vy *= DAMPING;
          }
        }

        for (let i = 0; i < strings.length; i++) {
          const { points, leftDeltas, rightDeltas } = strings[i];
          const len = points.length;

          for (let iter = 0; iter < 2; iter++) {
            for (let j = 0; j < len; j++) {
              if (j > 0) leftDeltas[j] = SPREAD * (points[j - 1].y - points[j].y);
              if (j < len - 1) rightDeltas[j] = SPREAD * (points[j + 1].y - points[j].y);
            }
            for (let j = 0; j < len; j++) {
              points[j].vy += leftDeltas[j] + rightDeltas[j];
              points[j].y += points[j].vy;
            }
          }
        }
      };

      const render = () => {
        ctx.fillStyle = '#000000';
        ctx.fillRect(0, 0, width, height);
        ctx.globalCompositeOperation = 'screen';
        ctx.strokeStyle = 'rgba(255, 250, 245, 0.06)';
        ctx.lineWidth = 1.5;

        for (let i = 0; i < strings.length; i++) {
          const pts = strings[i].points;
          ctx.beginPath();
          ctx.moveTo(pts[0].x, pts[0].y);

          for (let j = 1; j < pts.length - 1; j++) {
            const xc = (pts[j].x + pts[j + 1].x) / 2;
            const yc = (pts[j].y + pts[j + 1].y) / 2;
            ctx.quadraticCurveTo(pts[j].x, pts[j].y, xc, yc);
          }
          ctx.lineTo(pts[pts.length - 1].x, pts[pts.length - 1].y);
          ctx.stroke();
        }
        ctx.globalCompositeOperation = 'source-over';
      };

      let lastTime = 0;
      let accumulator = 0;

      const animate = (time) => {
        if (!isVisible) return;
        
        if (!lastTime) lastTime = time;
        let dt = time - lastTime;
        
        if (dt > 100) dt = PHYSICS_STEP; 
        
        lastTime = time;
        accumulator += dt;

        while (accumulator >= PHYSICS_STEP) {
          updatePhysics();
          accumulator -= PHYSICS_STEP;
        }

        render();
        lastMouse.x = mouse.x;
        lastMouse.y = mouse.y;
        animationFrameId = requestAnimationFrame(animate);
      };

      const resize = () => {
        const dpr = window.devicePixelRatio || 1;
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width * dpr;
        canvas.height = height * dpr;
        ctx.scale(dpr, dpr);
        init();
        if (!isVisible) render();
      };

      let resizeTimeout;
      const handleResize = () => {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(resize, 150);
      };

      const setMouseParams = (x, y, isStart = false) => {
        if (isStart) {
          lastMouse.x = x;
          lastMouse.y = y;
        }
        mouse.x = x;
        mouse.y = y;
      };

      const clearMouse = () => setMouseParams(-1000, -1000, true);

      const handleVisibilityChange = () => {
        isVisible = document.visibilityState === 'visible';
        if (isVisible) {
          lastTime = 0;
          animationFrameId = requestAnimationFrame(animate);
        } else {
          cancelAnimationFrame(animationFrameId);
        }
      };

      window.addEventListener('mousemove', (e) => setMouseParams(e.clientX, e.clientY));
      window.addEventListener('touchstart', (e) => setMouseParams(e.touches[0].clientX, e.touches[0].clientY, true), { passive: true });
      window.addEventListener('touchmove', (e) => setMouseParams(e.touches[0].clientX, e.touches[0].clientY), { passive: true });
      window.addEventListener('mouseleave', clearMouse);
      window.addEventListener('touchend', clearMouse);
      window.addEventListener('touchcancel', clearMouse);
      window.addEventListener('resize', handleResize);
      document.addEventListener('visibilitychange', handleVisibilityChange);

      resize();
      animationFrameId = requestAnimationFrame(animate);

      const startApp = () => {
        document.body.classList.add('fonts-loaded');
        setTimeout(() => {
          const centerX = width / 2;
          const centerY = height / 2;
          lastMouse.x = centerX;
          lastMouse.y = centerY - 150;
          mouse.x = centerX;
          mouse.y = centerY;
          setTimeout(clearMouse, 200);
        }, 400);
      };

      if (document.fonts) {
        document.fonts.ready.then(startApp).catch(startApp);
      } else {
        startApp();
      }
    })();
  </script>
</body>
</html>
