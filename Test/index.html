<script>
  (()=>{
    const s = localStorage.getItem('theme');
    const d = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
    const t = s || d;
    document.documentElement.setAttribute('data-theme', t);
    document.getElementById('meta-theme-color').setAttribute('content', t === 'dark' ? '#000000' : '#ffffff');
  })();
</script>

<style>
  :root {
    --bg: #ffffff;
    --bg-rgb: 255, 255, 255;
    --text-primary: rgba(0, 0, 0, 0.92);
    --text-secondary: rgba(0, 0, 0, 0.60);
    --text-tertiary: rgba(0, 0, 0, 0.35);
    --vignette: #ffffff;
    --glow-shadow: 0 4px 24px rgba(255, 255, 255, 1), 0 2px 8px rgba(255, 255, 255, 0.6);
    --accent: #F36523;
    --icon-halo: rgba(243, 101, 35, 0.10);
    --theme-ease: cubic-bezier(0.25, 1, 0.5, 1);
    --theme-duration: 2.2s;
    
    /* Smooth Audio Variables */
    --audio-breathe: 0;
    --audio-pulse: 0;

  [data-theme="dark"] {
    --bg: #000000;
    --bg-rgb: 0, 0, 0;

    --text-secondary: rgba(255, 255, 255, 0.60);
    --text-tertiary: rgba(255, 255, 255, 0.35);
    --vignette: #000000;
    --glow-shadow: 0 4px 24px rgba(0, 0, 0, 1), 0 2px 8px rgba(0, 0, 0, 0.6);
    --accent: #FF7A3D;
    --icon-halo: rgba(255, 122, 61, 0.32);
  }
  
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  
  html, body {
    margin: 0; padding: 0; width: 100vw; height: 100dvh;
    background: var(--bg); color: var(--text-primary);
    font-family: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased; 
    overscroll-behavior: none; overflow: hidden; 
    transition: background-color var(--theme-duration) var(--theme-ease), color var(--theme-duration) var(--theme-ease);
  }

  #resonance-field { position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; z-index: 1; opacity: 0; transition: opacity 3s var(--theme-ease); will-change: transform; touch-action: none; }
  body.ready #resonance-field { opacity: 1; }
  
  .vignette { position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; z-index: 2; background: radial-gradient(circle at center, transparent 30%, var(--vignette) 120%); pointer-events: none; transition: background var(--theme-duration) var(--theme-ease); }
  
  main { position: relative; z-index: 10; width: 100%; height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 0 5vw; pointer-events: none; will-change: transform; }

  /* Smooth UI Fading */
  .fade-ui { transition: opacity 1.2s ease, transform 1.2s ease; will-change: opacity, transform; }
  body.is-playing .fade-ui { opacity: 0 !important; transform: translateY(-20px); pointer-events: none; }
  
  .text-glow { text-shadow: var(--glow-shadow); transition: text-shadow var(--theme-duration) var(--theme-ease), color var(--theme-duration) var(--theme-ease); }
  
  .theme-toggle, .audio-toggle {
    position: fixed; top: clamp(1.5rem, 4vh, 2.5rem); z-index: 20;
    background: transparent; border: none; color: var(--text-secondary);
    cursor: pointer; padding: 0.75rem; display: flex; align-items: center; justify-content: center;
    transition: color 0.4s ease, transform 0.4s var(--theme-ease); opacity: 0; pointer-events: auto;
  }
  .theme-toggle { right: clamp(1.5rem, 4vw, 2.5rem); }
  .audio-toggle { right: calc(clamp(1.5rem, 4vw, 2.5rem) + 3.2rem); pointer-events: none; }
  .theme-toggle:hover, .audio-toggle:hover { color: var(--text-primary); transform: scale(1.1); }
  .theme-toggle svg, .audio-toggle svg { width: 22px; height: 22px; }

  .audio-credit {

  body.is-playing .logo {
    transform: translateY(15vh) scale(1.3);
  }

  body.is-playing .logo-icon::before,

    animation: none !important; 
    transition: transform 0.1s ease-out, opacity 0.1s ease-out !important;
    transform: scale(calc(1.0 + var(--audio-breathe) * 0.2 + var(--audio-pulse) * 0.3));
    opacity: calc(0.1 + var(--audio-breathe) * 0.3 + var(--audio-pulse) * 0.6); /* Capped max opacity */
  }
  
  body.is-playing .logo img,
  body.is-settling .logo img {
    animation: none !important; 
    transition: transform 0.1s ease-out, filter 0.1s ease-out !important;
    transform: scale(calc(1.0 + var(--audio-pulse) * 0.08)); /* Gentle bump */
    filter: drop-shadow(0 calc(4px + var(--audio-pulse)*8px) calc(24px + var(--audio-pulse)*20px) rgba(243, 101, 35, calc(0.15 + var(--audio-pulse)*0.5))) 
            drop-shadow(0 0 calc(8px + var(--audio-pulse)*12px) rgba(255, 200, 67, calc(0.05 + var(--audio-pulse)*0.2)));
  }

  .logo span { color: var(--accent); transition: color var(--theme-duration) var(--theme-ease); }
  h1 { font-weight: 300; font-size: clamp(2.5rem, 7vw, 6.5rem); line-height: 1.05; letter-spacing: -0.04em; margin: 0 0 clamp(1.25rem, 3vh, 2rem) 0; }
  h1 em { font-family: 'Instrument Serif', serif; font-style: italic; font-weight: 400; font-size: 1.1em; color: var(--text-primary); padding-right: 0.05em; }
  p.sub { font-weight: 400; font-size: clamp(1rem, 1.5vw, 1.25rem); line-height: 1.6; letter-spacing: -0.01em; color: var(--text-secondary); margin: 0 0 6vh 0; }
  .status-badge { display: inline-flex; font-size: 0.75rem; font-weight: 400; letter-spacing: 0.04em; text-transform: uppercase; color: var(--text-tertiary); }
  
  body.ready .logo-wrapper { animation: cinematicReveal 1.6s var(--theme-ease) 0.1s forwards; }
  body.ready h1 { animation: cinematicReveal 1.6s var(--theme-ease) 0.25s forwards; }
  body.ready p.sub { animation: cinematicReveal 1.6s var(--theme-ease) 0.4s forwards; }

  body.ready .theme-toggle { animation: cinematicReveal 1.6s var(--theme-ease) 0.85s forwards; }
  body.ready .audio-toggle.yt-ready { animation: cinematicReveal 1.6s var(--theme-ease) 0.95s forwards; pointer-events: auto; }

  @keyframes cinematicReveal { 0% { opacity: 0; filter: blur(12px); transform: translateY(16px) scale(0.98); } 100% { opacity: 1; filter: blur(0); transform: translateY(0) scale(1); } }
  @keyframes ambientResonance { 0% { transform: scale(1); filter: drop-shadow(0 4px 24px rgba(243, 101, 35, 0.15)); } 100% { transform: scale(1.03); filter: drop-shadow(0 8px 32px rgba(243, 101, 35, 0.35)); } }
  @keyframes haloPulse { 0% { opacity: 0.6; transform: scale(1); } 100% { opacity: 1; transform: scale(1.1); } }
</style>

  <script>
    (() => {
      const themeToggleBtn = document.getElementById('theme-toggle');
      const metaThemeColor = document.getElementById('meta-theme-color');
      
      let tR = 255, tG = 250, tB = 245, cR = 255, cG = 250, cB = 245;
      let isDarkTheme = true;

      const applyThemeVars = (theme) => {
        isDarkTheme = theme === 'dark';
        tR = isDarkTheme ? 255 : 0; tG = isDarkTheme ? 250 : 0; tB = isDarkTheme ? 245 : 0;
      };

      const setTheme = (theme) => {
        document.documentElement.setAttribute('data-theme', theme);
        metaThemeColor.setAttribute('content', theme === 'dark' ? '#000000' : '#ffffff');
        localStorage.setItem('theme', theme);
        applyThemeVars(theme);
      };

      applyThemeVars(document.documentElement.getAttribute('data-theme'));
      cR = tR; cG = tG; cB = tB;

      themeToggleBtn.addEventListener('click', () => {
        setTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
      });

      // --- YouTube Audio Setup ---
      const ytScript = document.createElement('script');
      ytScript.src = "https://www.youtube.com/iframe_api";
      document.head.appendChild(ytScript);

      let player, isPlaying = false, ytReady = false;
      let audioBass = 0, audioMids = 0, audioHighs = 0;
      
      // Smooth Damping Variables
      let smoothBreathe = 0, beatPulse = 0;
      let lastBassVal = 0, lastBeatTime = 0; 

      window.onYouTubeIframeAPIReady = () => {
        player = new YT.Player('yt-player', {
          height: '0', width: '0', videoId: 'WGjqUvq0Ya0',
          playerVars: { 'autoplay': 0, 'controls': 0, 'disablekb': 1, 'playsinline': 1 },
          events: {
            'onReady': () => {
               ytReady = true;
               document.getElementById('audio-toggle').classList.add('yt-ready');
            },
            'onStateChange': (e) => {
               if (e.data === YT.PlayerState.PLAYING) {
                 isPlaying = true;
                 document.body.classList.remove('is-settling');
                 document.body.classList.add('is-playing');
                 document.querySelector('.icon-play').style.display = 'none';
                 document.querySelector('.icon-pause').style.display = 'block';
                 document.getElementById('audio-credit').classList.add('visible');
                 wakePhysics(); 
               } else {
                 isPlaying = false;
                 document.body.classList.remove('is-playing');
                 document.body.classList.add('is-settling');
                 document.querySelector('.icon-play').style.display = 'block';
                 document.querySelector('.icon-pause').style.display = 'none';
                 document.getElementById('audio-credit').classList.remove('visible');
               }
            }
          }
        });
      };

      document.getElementById('audio-toggle').addEventListener('click', () => {
        if (!ytReady) return;
        if (isPlaying) player.pauseVideo();
        else player.playVideo();
      });

      // --- The Echoes of History (Timeline Data) ---
      const timelineFacts = [
        "13.8 Billion BC: The Big Bang",
        "4.5 Billion BC: Formation of the Earth",
        "3.8 Billion BC: First Life Emerges",
        "66 Million BC: Extinction of the Dinosaurs",

        "2021 AD: Launch of the James Webb Telescope",
        "2022 AD: Breakthrough in Artificial Intelligence",
        "2024 AD: The Return to the Moon (Artemis)",
        "2026 AD: Rssonate is Released."
      ];
      
      let activeEcho = null;
      let nextFactIndex = 0;
      // Spread ~63 events across 514 seconds = roughly 1 event every 8.1 seconds
      const FACT_INTERVAL = 8.0; 

      class EchoHistory {
        constructor(text) {
          this.text = text;
          this.y = height * 0.85; // Start from bottom
          this.alpha = 0;
          this.state = 'fade_in';
          this.speed = 0.4;
        }
        update() {
          this.y -= this.speed;
          
          if (this.state === 'fade_in') {
            this.alpha += 0.015;
            if (this.alpha >= 1) { this.alpha = 1; this.state = 'hold'; }
          } else if (this.state === 'hold') {
            // Start fading out when it gets past the upper middle
            if (this.y < height * 0.25) this.state = 'fade_out';
          } else if (this.state === 'fade_out') {
            this.alpha -= 0.015;
            if (this.alpha <= 0) return true; // Signal deletion
          }
          return false;
        }
        draw(ctx, isDark) {
          if (this.alpha <= 0) return;
          ctx.save();
          let r = isDark ? 255 : 0; let g = isDark ? 255 : 0; let b = isDark ? 255 : 0;
          
          // Smooth glowing drop-shadow for incredible legibility
          ctx.shadowColor = `rgba(${r},${g},${b}, ${this.alpha * 0.8})`;
          ctx.shadowBlur = 12;
          
          ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${this.alpha * 0.8})`;
          ctx.font = "300 clamp(16px, 2.5vw, 24px) 'Geist'";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.letterSpacing = "0.05em";
          ctx.fillText(this.text, width / 2, this.y);
          ctx.restore();
        }
      }

      // --- Canvas Physics Engine ---
      const canvas = document.getElementById('resonance-field');
      const ctx = canvas.getContext('2d', { alpha: true });

      let width, height, strings = [], animationFrameId = null, resizeTimeout;
      let isVisible = true, isSleeping = false;
      
      const NUM_STRINGS = 55, RESOLUTION = 30, SPREAD = 0.15, MOUSE_FORCE = 4.0, PHYSICS_STEP = 1000 / 120;
      let baseTension = 0.035, baseDamping = 0.92;
      let currentTension = baseTension, currentDamping = baseDamping;
      let mouseRadius = 150;
      
      const mouse = { x: -1000, y: -1000 }, lastMouse = { x: -1000, y: -1000 };

      class StringPoint {
        constructor(x, y) { this.x = x; this.baseY = y; this.y = y; this.vy = 0; }
      }

      const init = () => {
        strings = [];
        const numPoints = Math.ceil(width / RESOLUTION) + 2;
        const spacingY = height / NUM_STRINGS;
        mouseRadius = Math.max(Math.min(width, height) * 0.2, 120);
        for (let i = 0; i < NUM_STRINGS; i++) {
          const pts = [];
          for (let j = 0; j < numPoints; j++) pts.push(new StringPoint(j * RESOLUTION - RESOLUTION, i * spacingY));
          strings.push({ points: pts, leftDeltas: new Float32Array(numPoints), rightDeltas: new Float32Array(numPoints) });
        }
      };

      const wakePhysics = () => {
        isSleeping = false;
        if (!animationFrameId) {
          lastTime = performance.now();
          accumulator = 0;
          animationFrameId = requestAnimationFrame(animate);
        }
      };

      const updatePhysics = () => {
        let maxV = 0;

        if (isPlaying && ytReady && typeof trackData !== 'undefined' && trackData.length > 0) {
          let currentTime = player.getCurrentTime();
          let frameIndex = Math.floor(currentTime * 20); 
          
          if (frameIndex < trackData.length) {
            let frame = trackData[frameIndex];
            
            // Smoothed global equalizers for UI
            audioBass += (frame.b - audioBass) * 0.15;
            audioMids += (frame.m - audioMids) * 0.15;
            audioHighs += (frame.h - audioHighs) * 0.15;

            // --- STRICT TRANSIENT BEAT DETECTOR (Fixes Violin Spikes) ---
            // Only triggers if Bass is very high, AND jumped suddenly, AND 350ms have passed
            let isBeat = false;
            if (frame.b > 0.7 && (frame.b - lastBassVal) > 0.15 && (currentTime - lastBeatTime) > 0.35) {
              isBeat = true;
              lastBeatTime = currentTime;
              beatPulse = 1.0;
            }
            lastBassVal = frame.b;
            
            // Smooth decay for beat pulse
            beatPulse += (0 - beatPulse) * 0.08; 
            
            // Slow, majestic breathing for violin parts
            smoothBreathe += (frame.m - smoothBreathe) * 0.03; 

            document.documentElement.style.setProperty('--audio-breathe', smoothBreathe);
            document.documentElement.style.setProperty('--audio-pulse', beatPulse);
            
            // Render Live Equalizer
            const barB = document.getElementById('bar-b'); const barM = document.getElementById('bar-m'); const barH = document.getElementById('bar-h');
            if(barB) barB.style.height = Math.max(4, audioBass * 18) + 'px';
            if(barM) barM.style.height = Math.max(4, audioMids * 18) + 'px';
            if(barH) barH.style.height = Math.max(4, audioHighs * 18) + 'px';

            // --- COLOR INJECTION (Only on actual beats) ---
            let targetR = tR, targetG = tG, targetB = tB;
            if (beatPulse > 0.3) {
              let mix = Math.min(1, beatPulse * 1.5); 
              targetR = tR + (243 - tR) * mix; targetG = tG + (101 - tG) * mix; targetB = tB + (35 - tB) * mix;
            }
            cR += (targetR - cR) * 0.08; cG += (targetG - cG) * 0.08; cB += (targetB - cB) * 0.08;

            // --- TIMELINE LOGIC ---
            // Check if it's time to spawn the next fact
            if (currentTime > nextFactIndex * FACT_INTERVAL && nextFactIndex < timelineFacts.length) {
              if (!activeEcho) {
                activeEcho = new EchoHistory(timelineFacts[nextFactIndex]);
                nextFactIndex++;
              }
            }

            // --- STRINGS AGITATION (Violin Bow vs Drop) ---
            let centerStr = Math.floor(strings.length / 2);
            
            // When bass is low, strings loosen for big waves. When beat drops, they snap tight.
            currentTension = baseTension + (audioBass * 0.08);
            currentDamping = baseDamping - (audioHighs * 0.02); 

            // Violin Bowing (Massive Sine Waves during quiet parts)
            let calmMultiplier = Math.max(0, 1.0 - (audioBass * 1.5)); 
            let wavePhase = currentTime * 1.5;

            for (let i = 0; i < strings.length; i++) {
              let pts = strings[i].points;
              let midPt = Math.floor(pts.length / 2);
              let distRatio = Math.abs(i - centerStr) / centerStr;

              // Gentle Violin Waves
              if (calmMultiplier > 0.1) {
                let stringPhase = (i / NUM_STRINGS) * Math.PI * 1.5; 
                let bowForce = Math.sin(wavePhase + stringPhase) * smoothBreathe * calmMultiplier * 10.0; 
                for (let p = 1; p < pts.length - 1; p++) {
                  let bell = Math.sin((p / (pts.length - 1)) * Math.PI); 
                  pts[p].vy += bowForce * bell * 0.15;
                }
              }

              // True Kick Drum Strike
              if (isBeat) {
                let direction = (i < centerStr) ? -1 : 1;
                if (i === centerStr) direction = Math.random() > 0.5 ? 1 : -1;
                let force = (1 - distRatio) * 14.0; 
                pts[midPt].vy += force * direction;
              }
              
              // Highs Scatter
              if (frame.h > 0.4 && distRatio > 0.5 && Math.random() > 0.8) {
                pts[midPt].vy += frame.h * 2.0 * (Math.random() > 0.5 ? 1 : -1);
              }
            }
          }
        } else if (!isPlaying) {
          audioBass += (0 - audioBass) * 0.05; 
          beatPulse += (0 - beatPulse) * 0.05; 
          smoothBreathe += (0 - smoothBreathe) * 0.05;
          audioMids += (0 - audioMids) * 0.05; audioHighs += (0 - audioHighs) * 0.05;
          
          document.documentElement.style.setProperty('--audio-breathe', smoothBreathe);
          document.documentElement.style.setProperty('--audio-pulse', beatPulse);
          
          cR += (tR - cR) * 0.05; cG += (tG - cG) * 0.05; cB += (tB - cB) * 0.05;
          currentTension = baseTension; currentDamping = baseDamping;
          
          if (audioBass < 0.01 && document.body.classList.contains('is-settling')) {
            document.body.classList.remove('is-settling');
            audioBass = 0; beatPulse = 0; smoothBreathe = 0;
            activeEcho = null; 
            nextFactIndex = 0; // Reset timeline if stopped
          }
        }

        // Timeline Update
        if (activeEcho) {
          let done = activeEcho.update();
          if (done) activeEcho = null;
        }

        // Mouse Physics
        for (let i = 0; i < strings.length; i++) {
          const pts = strings[i].points;
          for (let j = 0; j < pts.length; j++) {
            const p = pts[j];
            const dist = Math.hypot(mouse.x - p.x, mouse.y - p.baseY);
            if (dist < mouseRadius) {
              const force = (mouseRadius - dist) / mouseRadius;
              let mouseSpeedY = Math.max(-20, Math.min(20, mouse.y - lastMouse.y));
              if (Math.abs(mouseSpeedY) > 0.5) p.vy += (mouseSpeedY * force * 0.15);
              else p.vy += ((mouse.y - p.baseY) > 0 ? -1 : 1) * force * MOUSE_FORCE * 0.15;
            }
            p.vy -= (p.y - p.baseY) * currentTension;
            p.vy *= currentDamping;
            if (Math.abs(p.vy) > maxV) maxV = Math.abs(p.vy);
          }
        }
        for (let i = 0; i < strings.length; i++) {
          const { points, leftDeltas, rightDeltas } = strings[i];
          const len = points.length;
          for (let iter = 0; iter < 2; iter++) {
            for (let j = 0; j < len; j++) {
              if (j > 0) leftDeltas[j] = SPREAD * (points[j - 1].y - points[j].y);
              if (j < len - 1) rightDeltas[j] = SPREAD * (points[j + 1].y - points[j].y);
            }
            for (let j = 0; j < len; j++) {
              points[j].vy += leftDeltas[j] + rightDeltas[j];
              points[j].y += points[j].vy;
            }
          }
        }
        
        if (maxV < 0.02 && mouse.x === -1000 && !isPlaying) isSleeping = true;
      };

      const render = () => {
        ctx.clearRect(0, 0, width, height);
        
        // Soft-clamped luminance to prevent blinding strobe effects
        let alpha = Math.min(0.25, 0.08 + (audioBass * 0.1));
        let lw = 1.5 + (beatPulse * 1.5);
        
        ctx.strokeStyle = `rgba(${Math.round(cR)}, ${Math.round(cG)}, ${Math.round(cB)}, ${alpha})`;
        ctx.lineWidth = lw;
        
        for (let i = 0; i < strings.length; i++) {
          const pts = strings[i].points;
          ctx.beginPath();
          ctx.moveTo(pts[0].x, pts[0].y);
          for (let j = 1; j < pts.length - 1; j++) {
            ctx.quadraticCurveTo(pts[j].x, pts[j].y, (pts[j].x + pts[j + 1].x) / 2, (pts[j].y + pts[j + 1].y) / 2);
          }
          ctx.lineTo(pts[pts.length - 1].x, pts[pts.length - 1].y);
          ctx.stroke();
        }

        // Render Echo Timeline
        if (activeEcho) {
          activeEcho.draw(ctx, isDarkTheme);
        }
      };

      let lastTime = performance.now(), accumulator = 0;

      const animate = (time) => {
        if (!isVisible || isSleeping) { animationFrameId = null; return; }
        let dt = time - lastTime;
        if (dt > 100) dt = PHYSICS_STEP; 
        lastTime = time;
        accumulator += dt;
        while (accumulator >= PHYSICS_STEP) { updatePhysics(); accumulator -= PHYSICS_STEP; }
        render();
        lastMouse.x = mouse.x; lastMouse.y = mouse.y;
        animationFrameId = requestAnimationFrame(animate);
      };

      const resize = () => {
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        width = window.innerWidth; height = window.innerHeight;
        canvas.width = width * dpr; canvas.height = height * dpr;
        ctx.scale(dpr, dpr);
        init();
        if (!isVisible || isSleeping) render();
      };

      const setMouseParams = (x, y, isStart = false) => {
        if (isStart) { lastMouse.x = x; lastMouse.y = y; }
        mouse.x = x; mouse.y = y;
        wakePhysics();
      };

      const clearMouse = () => setMouseParams(-1000, -1000, true);

      window.addEventListener('mousemove', (e) => setMouseParams(e.clientX, e.clientY));
      window.addEventListener('touchstart', (e) => setMouseParams(e.touches[0].clientX, e.touches[0].clientY, true), { passive: true });
      window.addEventListener('touchmove', (e) => setMouseParams(e.touches[0].clientX, e.touches[0].clientY), { passive: true });
      window.addEventListener('mouseleave', clearMouse);
      window.addEventListener('touchend', clearMouse);
      window.addEventListener('touchcancel', clearMouse);
      window.addEventListener('resize', () => { clearTimeout(resizeTimeout); resizeTimeout = setTimeout(resize, 150); });
      
      document.addEventListener('visibilitychange', () => {
        isVisible = document.visibilityState === 'visible';
        if (isVisible) { wakePhysics(); } 
        else { if (animationFrameId) { cancelAnimationFrame(animationFrameId); animationFrameId = null; } }
      });

      const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)');
      if (prefersReducedMotion.matches) isSleeping = true;
      prefersReducedMotion.addEventListener('change', (e) => {
        if (e.matches) { isSleeping = true; clearMouse(); } else wakePhysics();
      });

      resize();
      wakePhysics(); 

      const startApp = () => {
        document.body.classList.add('ready');
        if (!prefersReducedMotion.matches) {
          setTimeout(() => {
            const cx = width / 2, cy = height / 2;
            lastMouse.x = cx; lastMouse.y = cy - 150; mouse.x = cx; mouse.y = cy;
            wakePhysics();
            setTimeout(clearMouse, 200);
          }, 400);
        }
      };

      const fontPromise = document.fonts ? document.fonts.ready : Promise.resolve();
      const timeoutPromise = new Promise(resolve => setTimeout(resolve, 2500));
      Promise.race([fontPromise, timeoutPromise]).then(startApp).catch(startApp);
    })();
  </script>
</body>
</html>
