<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="color-scheme" content="dark light">
<meta name="theme-color" id="meta-theme-color" content="#000000">
<meta name="robots" content="noindex"> <!-- Keeps your test site hidden from Google -->
<title>Rssonate | Audio Reactive Test</title>

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<script src="track-data.js"></script>

<script>
  (()=>{
    const s = localStorage.getItem('theme');
    const d = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
    const t = s || d;
    document.documentElement.setAttribute('data-theme', t);
    document.getElementById('meta-theme-color').setAttribute('content', t === 'dark' ? '#000000' : '#ffffff');
  })();
</script>

<style>
  :root {
    --bg: #ffffff;
    --bg-rgb: 255, 255, 255;
    --text-primary: rgba(0, 0, 0, 0.92);
    --text-secondary: rgba(0, 0, 0, 0.60);
    --text-tertiary: rgba(0, 0, 0, 0.35);
    --vignette: #ffffff;
    --glow-shadow: 0 4px 24px rgba(255, 255, 255, 1), 0 2px 8px rgba(255, 255, 255, 0.6);
    --accent: #F36523;
    --icon-halo: rgba(243, 101, 35, 0.10);
    --theme-ease: cubic-bezier(0.25, 1, 0.5, 1);
    --theme-duration: 2.2s;
    
    /* Audio Reactive Variable */
    --audio-bass: 0;
  }
  [data-theme="dark"] {
    --bg: #000000;
    --bg-rgb: 0, 0, 0;
    --text-primary: rgba(255, 255, 255, 0.92);
    --text-secondary: rgba(255, 255, 255, 0.60);
    --text-tertiary: rgba(255, 255, 255, 0.35);
    --vignette: #000000;
    --glow-shadow: 0 4px 24px rgba(0, 0, 0, 1), 0 2px 8px rgba(0, 0, 0, 0.6);
    --accent: #FF7A3D;
    --icon-halo: rgba(255, 122, 61, 0.32);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; width: 100%; min-height: 100dvh;
    background: var(--bg); color: var(--text-primary);
    font-family: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased; overscroll-behavior: none; overflow: hidden;
    transition: background-color var(--theme-duration) var(--theme-ease), color var(--theme-duration) var(--theme-ease);
  }
  #resonance-field { position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; z-index: 1; opacity: 0; transition: opacity 3s var(--theme-ease); }
  body.ready #resonance-field { opacity: 1; }
  .vignette { position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; z-index: 2; background: radial-gradient(circle at center, transparent 30%, var(--vignette) 120%); pointer-events: none; transition: background var(--theme-duration) var(--theme-ease); }
  main { position: relative; z-index: 10; width: 100%; height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 0 5vw; pointer-events: none; }
  .text-glow { text-shadow: var(--glow-shadow); transition: text-shadow var(--theme-duration) var(--theme-ease), color var(--theme-duration) var(--theme-ease); }
  
  /* UI Elements */
  .theme-toggle, .audio-toggle {
    position: fixed; top: clamp(1.5rem, 4vh, 2.5rem); z-index: 20;
    background: transparent; border: none; color: var(--text-secondary);
    cursor: pointer; padding: 0.75rem; display: flex; align-items: center; justify-content: center;
    transition: color 0.4s ease, transform 0.4s var(--theme-ease); opacity: 0;
  }
  .theme-toggle { right: clamp(1.5rem, 4vw, 2.5rem); }
  .audio-toggle { right: calc(clamp(1.5rem, 4vw, 2.5rem) + 3.2rem); pointer-events: none; }
  .theme-toggle:hover, .audio-toggle:hover { color: var(--text-primary); transform: scale(1.1); }
  .theme-toggle svg, .audio-toggle svg { width: 22px; height: 22px; }
  [data-theme="dark"] .icon-moon { display: none; }
  [data-theme="light"] .icon-sun { display: none; }

  /* Credit Card */
  .audio-credit {
    position: fixed; bottom: max(2.5rem, env(safe-area-inset-bottom)); right: clamp(1.5rem, 4vw, 2.5rem); z-index: 20;
    display: flex; align-items: center; gap: 14px;
    background: rgba(var(--bg-rgb), 0.4); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    padding: 12px 20px; border-radius: 100px; border: 1px solid rgba(128, 128, 128, 0.15);
    box-shadow: 0 8px 32px rgba(0,0,0,0.1);
    opacity: 0; transform: translateY(20px); transition: all 0.8s var(--theme-ease); pointer-events: none;
  }
  .audio-credit.visible { opacity: 1; transform: translateY(0); }
  .credit-text { display: flex; flex-direction: column; text-align: left; }
  .credit-text strong { font-size: 0.75rem; font-weight: 600; color: var(--text-primary); letter-spacing: -0.01em; line-height: 1.2; }
  .credit-text span { font-size: 0.65rem; color: var(--text-tertiary); margin-top: 2px; }
  .audio-bars { display: flex; gap: 3px; align-items: flex-end; height: 18px; padding-bottom: 2px; }
  .audio-bars span { width: 3px; background: var(--accent); border-radius: 3px; height: 4px; transition: height 0.05s linear; will-change: height; }

  .logo, h1, p.sub, .status-badge, footer { opacity: 0; }
  .logo { display: flex; flex-direction: column; align-items: center; gap: 0.85rem; font-weight: 600; font-size: 1.1rem; letter-spacing: -0.04em; color: var(--text-primary); margin-bottom: 6vh; }
  .logo-icon { position: relative; display: flex; align-items: center; justify-content: center; font-size: clamp(44px, 6vw, 72px); }
  
  /* Original Animations */
  .logo-icon::before {
    content: ''; position: absolute; inset: -55%; background: radial-gradient(circle, var(--icon-halo) 0%, transparent 70%); filter: blur(0.25em); z-index: -1;
    animation: haloPulse 6s ease-in-out 1.8s infinite alternate; transition: background var(--theme-duration) var(--theme-ease);
  }
  .logo img {
    width: 1em; height: 1em; object-fit: contain; will-change: transform, filter;
    filter: drop-shadow(0 4px 24px rgba(243, 101, 35, 0.15)) drop-shadow(0 0 8px rgba(255, 200, 67, 0.05));
    animation: ambientResonance 6s ease-in-out 1.8s infinite alternate;
  }
  
  /* --- AUDIO REACTIVE ANIMATION OVERRIDES --- */
  body.is-playing .logo-icon::before {
    animation: none !important;
    transform: scale(calc(1 + var(--audio-bass) * 0.45));
    opacity: calc(0.3 + var(--audio-bass) * 0.7);
    transition: none; 
  }
  body.is-playing .logo img {
    animation: none !important;
    transform: scale(calc(1 + var(--audio-bass) * 0.15));
    filter: drop-shadow(0 calc(4px + var(--audio-bass)*12px) calc(24px + var(--audio-bass)*32px) rgba(243, 101, 35, calc(0.15 + var(--audio-bass)*0.6))) drop-shadow(0 0 calc(8px + var(--audio-bass)*16px) rgba(255, 200, 67, calc(0.05 + var(--audio-bass)*0.3)));
    transition: none;
  }
  /* ------------------------------------------ */

  .logo span { color: var(--accent); transition: color var(--theme-duration) var(--theme-ease); }
  h1 { font-weight: 300; font-size: clamp(2.5rem, 7vw, 6.5rem); line-height: 1.05; letter-spacing: -0.04em; margin: 0 0 clamp(1.25rem, 3vh, 2rem) 0; }
  h1 em { font-family: 'Instrument Serif', serif; font-style: italic; font-weight: 400; font-size: 1.1em; color: var(--text-primary); padding-right: 0.05em; }
  p.sub { font-weight: 400; font-size: clamp(1rem, 1.5vw, 1.25rem); line-height: 1.6; letter-spacing: -0.01em; color: var(--text-secondary); margin: 0 0 6vh 0; }
  .status-badge { display: inline-flex; font-size: 0.75rem; font-weight: 400; letter-spacing: 0.04em; text-transform: uppercase; color: var(--text-tertiary); }
  
  body.ready .logo { animation: cinematicReveal 1.6s var(--theme-ease) 0.1s forwards; }
  body.ready h1 { animation: cinematicReveal 1.6s var(--theme-ease) 0.25s forwards; }
  body.ready p.sub { animation: cinematicReveal 1.6s var(--theme-ease) 0.4s forwards; }
  body.ready .status-badge { animation: cinematicReveal 1.6s var(--theme-ease) 0.55s forwards; }
  body.ready .theme-toggle { animation: cinematicReveal 1.6s var(--theme-ease) 0.85s forwards; }
  
  /* Reveal play button only when YouTube is loaded */
  body.ready .audio-toggle.yt-ready { animation: cinematicReveal 1.6s var(--theme-ease) 0.95s forwards; pointer-events: auto; }

  @keyframes cinematicReveal { 0% { opacity: 0; filter: blur(12px); transform: translateY(16px) scale(0.98); } 100% { opacity: 1; filter: blur(0); transform: translateY(0) scale(1); } }
  @keyframes ambientResonance { 0% { transform: scale(1); filter: drop-shadow(0 4px 24px rgba(243, 101, 35, 0.15)); } 100% { transform: scale(1.03); filter: drop-shadow(0 8px 32px rgba(243, 101, 35, 0.35)); } }
  @keyframes haloPulse { 0% { opacity: 0.6; transform: scale(1); } 100% { opacity: 1; transform: scale(1.1); } }
</style>

<body>
  <!-- Hidden YouTube Player -->
  <div id="yt-player" style="display: none;"></div>

  <button id="audio-toggle" class="audio-toggle" aria-label="Play Track">
    <svg class="icon-play" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">

      <rect x="14" y="4" width="4" height="16"></rect>
    </svg>
  </button>

  <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
    </svg>
    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
    </svg>
  </button>

  <div id="audio-credit" class="audio-credit" aria-hidden="true">
    <div class="audio-bars">
      <span id="bar-b"></span>
      <span id="bar-m"></span>
      <span id="bar-h"></span>
    </div>
    <div class="credit-text">
      <strong>Unstoppable (Intro Mix)</strong>
      <span>Ronny K.</span>
    </div>
  </div>

  <canvas id="resonance-field" aria-hidden="true"></canvas>
  <div class="vignette" aria-hidden="true"></div>
  
  <main>
    <div class="logo text-glow">
      <div class="logo-icon">
        <img src="../icon.svg" alt="Rssonate"> <!-- Path adjusted for subfolder -->
      </div>
      <div>rssonate<span>.</span></div>
    </div>
    <h1 class="text-glow">An RSS reader to<br><em>deprecate</em> them all.</h1>
    <p class="sub text-glow">Private. Powerful. Personal.</p>
    <div class="status-badge text-glow">Audio Reactive Test</div>
  </main>

  <script>
    (() => {
      const themeToggleBtn = document.getElementById('theme-toggle');
      const metaThemeColor = document.getElementById('meta-theme-color');
      let tR = 255, tG = 250, tB = 245, cR = 255, cG = 250, cB = 245;

      const applyThemeVars = (theme) => {
        const isDark = theme === 'dark';
        tR = isDark ? 255 : 0; tG = isDark ? 250 : 0; tB = isDark ? 245 : 0;
      };

      const setTheme = (theme) => {
        document.documentElement.setAttribute('data-theme', theme);
        metaThemeColor.setAttribute('content', theme === 'dark' ? '#000000' : '#ffffff');
        localStorage.setItem('theme', theme);
        applyThemeVars(theme);
      };

      applyThemeVars(document.documentElement.getAttribute('data-theme'));
      cR = tR; cG = tG; cB = tB;

      themeToggleBtn.addEventListener('click', () => {
        setTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
      });

      // --- YouTube Audio Setup ---
      const ytScript = document.createElement('script');
      ytScript.src = "https://www.youtube.com/iframe_api";
      document.head.appendChild(ytScript);

      let player, isPlaying = false, ytReady = false;
      let audioBass = 0, audioMids = 0, audioHighs = 0, lastBass = 0;

      window.onYouTubeIframeAPIReady = () => {
        player = new YT.Player('yt-player', {
          height: '0', width: '0', videoId: 'WGjqUvq0Ya0',
          playerVars: { 'autoplay': 0, 'controls': 0, 'disablekb': 1, 'playsinline': 1 },
          events: {
            'onReady': () => {
               ytReady = true;
               document.getElementById('audio-toggle').classList.add('yt-ready');
            },
            'onStateChange': (e) => {
               if (e.data === YT.PlayerState.PLAYING) {
                 isPlaying = true;
                 document.body.classList.add('is-playing');
                 document.querySelector('.icon-play').style.display = 'none';
                 document.querySelector('.icon-pause').style.display = 'block';
                 document.getElementById('audio-credit').classList.add('visible');
                 wakePhysics(); 
               } else {
                 isPlaying = false;
                 document.body.classList.remove('is-playing');
                 document.querySelector('.icon-play').style.display = 'block';
                 document.querySelector('.icon-pause').style.display = 'none';
                 document.getElementById('audio-credit').classList.remove('visible');
               }
            }
          }
        });
      };

      document.getElementById('audio-toggle').addEventListener('click', () => {
        if (!ytReady) return;
        if (isPlaying) player.pauseVideo();
        else player.playVideo();
      });
      // ---------------------------

      const canvas = document.getElementById('resonance-field');
      const ctx = canvas.getContext('2d', { alpha: true });

      let width, height, strings = [], animationFrameId, resizeTimeout;
      let isVisible = true, isSleeping = false;
      const NUM_STRINGS = 55, RESOLUTION = 30, TENSION = 0.035, DAMPING = 0.92, SPREAD = 0.15, MOUSE_FORCE = 4.0, PHYSICS_STEP = 1000 / 120;
      let mouseRadius = 150;
      const mouse = { x: -1000, y: -1000 }, lastMouse = { x: -1000, y: -1000 };

      class StringPoint {
        constructor(x, y) { this.x = x; this.baseY = y; this.y = y; this.vy = 0; }
      }

      const init = () => {
        strings = [];
        const numPoints = Math.ceil(width / RESOLUTION) + 2;
        const spacingY = height / NUM_STRINGS;
        mouseRadius = Math.max(Math.min(width, height) * 0.2, 120);
        for (let i = 0; i < NUM_STRINGS; i++) {
          const pts = [];
          for (let j = 0; j < numPoints; j++) pts.push(new StringPoint(j * RESOLUTION - RESOLUTION, i * spacingY));
          strings.push({ points: pts, leftDeltas: new Float32Array(numPoints), rightDeltas: new Float32Array(numPoints) });
        }
      };

      const wakePhysics = () => {
        if (isSleeping) {
          isSleeping = false;
          lastTime = performance.now();
          animationFrameId = requestAnimationFrame(animate);
        }
      };

      const updatePhysics = () => {
        let maxV = 0;

        // --- PRE-BAKED AUDIO INJECTION ---
        if (isPlaying && ytReady && typeof trackData !== 'undefined' && trackData.length > 0) {
          let currentTime = player.getCurrentTime();
          let frameIndex = Math.floor(currentTime * 20); // Sync to 20fps data
          
          if (frameIndex < trackData.length) {
            let frame = trackData[frameIndex];
            
            // Smooth values for CSS UI
            audioBass += (frame.b - audioBass) * 0.3;
            audioMids += (frame.m - audioMids) * 0.3;
            audioHighs += (frame.h - audioHighs) * 0.3;
            document.documentElement.style.setProperty('--audio-bass', audioBass);
            
            // Live Equalizer Bars
            const barB = document.getElementById('bar-b');
            const barM = document.getElementById('bar-m');
            const barH = document.getElementById('bar-h');
            if(barB) barB.style.height = Math.max(4, audioBass * 18) + 'px';
            if(barM) barM.style.height = Math.max(4, audioMids * 18) + 'px';
            if(barH) barH.style.height = Math.max(4, audioHighs * 18) + 'px';

            // Agitate Strings!
            let center = Math.floor(strings.length / 2);
            let bassHit = frame.b > 0.65 && (frame.b - lastBass > 0.08); // Detect beat drop
            lastBass = frame.b;

            for (let i = 0; i < strings.length; i++) {
              let midPt = Math.floor(strings[i].points.length / 2);
              let distRatio = Math.abs(i - center) / center; // 0 at center, 1 at edge

              // 1. The Kick Drum (Bass) - Massive shockwave from center
              if (bassHit) {
                let direction = (i < center) ? -1 : 1;
                if (i === center) direction = Math.random() > 0.5 ? 1 : -1;
                let force = (1 - distRatio) * frame.b * 6.0; 
                strings[i].points[midPt].vy += force * direction;
              }

              // 2. The Synths (Mids) - Chaotic ripple through middle strings
              if (frame.m > 0.35 && Math.random() > 0.85) {
                strings[i].points[midPt].vy += frame.m * 2.0 * (Math.random() > 0.5 ? 1 : -1);
              }

              // 3. The Hi-Hats (Highs) - Tight fast vibrations on edge strings
              if (frame.h > 0.25 && distRatio > 0.6 && Math.random() > 0.7) {
                strings[i].points[midPt].vy += frame.h * 2.5 * (Math.random() > 0.5 ? 1 : -1);
              }
            }
          }
        } else if (!isPlaying) {
          audioBass += (0 - audioBass) * 0.1;
          document.documentElement.style.setProperty('--audio-bass', audioBass);
        }
        // ---------------------------------

        for (let i = 0; i < strings.length; i++) {
          const pts = strings[i].points;
          for (let j = 0; j < pts.length; j++) {
            const p = pts[j];
            const dist = Math.hypot(mouse.x - p.x, mouse.y - p.baseY);
            if (dist < mouseRadius) {
              const force = (mouseRadius - dist) / mouseRadius;
              let mouseSpeedY = Math.max(-20, Math.min(20, mouse.y - lastMouse.y));
              if (Math.abs(mouseSpeedY) > 0.5) p.vy += (mouseSpeedY * force * 0.15);
              else p.vy += ((mouse.y - p.baseY) > 0 ? -1 : 1) * force * MOUSE_FORCE * 0.15;
            }
            p.vy -= (p.y - p.baseY) * TENSION;
            p.vy *= DAMPING;
            if (Math.abs(p.vy) > maxV) maxV = Math.abs(p.vy);
          }
        }
        for (let i = 0; i < strings.length; i++) {
          const { points, leftDeltas, rightDeltas } = strings[i];
          const len = points.length;
          for (let iter = 0; iter < 2; iter++) {
            for (let j = 0; j < len; j++) {
              if (j > 0) leftDeltas[j] = SPREAD * (points[j - 1].y - points[j].y);
              if (j < len - 1) rightDeltas[j] = SPREAD * (points[j + 1].y - points[j].y);
            }
            for (let j = 0; j < len; j++) {
              points[j].vy += leftDeltas[j] + rightDeltas[j];
              points[j].y += points[j].vy;
            }
          }
        }
        // Never sleep if audio is playing
        if (maxV < 0.02 && mouse.x === -1000 && !isPlaying) isSleeping = true;
      };

      const render = () => {
        ctx.clearRect(0, 0, width, height);
        cR += (tR - cR) * 0.015; cG += (tG - cG) * 0.015; cB += (tB - cB) * 0.015;
        ctx.strokeStyle = `rgba(${Math.round(cR)}, ${Math.round(cG)}, ${Math.round(cB)}, 0.08)`;
        ctx.lineWidth = 1.5;
        for (let i = 0; i < strings.length; i++) {
          const pts = strings[i].points;
          ctx.beginPath();
          ctx.moveTo(pts[0].x, pts[0].y);
          for (let j = 1; j < pts.length - 1; j++) {
            ctx.quadraticCurveTo(pts[j].x, pts[j].y, (pts[j].x + pts[j + 1].x) / 2, (pts[j].y + pts[j + 1].y) / 2);
          }
          ctx.lineTo(pts[pts.length - 1].x, pts[pts.length - 1].y);
          ctx.stroke();
        }
      };

      let lastTime = performance.now(), accumulator = 0;

      const animate = (time) => {
        if (!isVisible || isSleeping) return;
        let dt = time - lastTime;
        if (dt > 100) dt = PHYSICS_STEP;
        lastTime = time;
        accumulator += dt;
        while (accumulator >= PHYSICS_STEP) { updatePhysics(); accumulator -= PHYSICS_STEP; }
        render();
        lastMouse.x = mouse.x; lastMouse.y = mouse.y;
        animationFrameId = requestAnimationFrame(animate);
      };

      const resize = () => {
        const dpr = window.devicePixelRatio || 1;
        width = window.innerWidth; height = window.innerHeight;
        canvas.width = width * dpr; canvas.height = height * dpr;
        ctx.scale(dpr, dpr);
        init();
        if (!isVisible || isSleeping) render();
      };

      const setMouseParams = (x, y, isStart = false) => {
        if (isStart) { lastMouse.x = x; lastMouse.y = y; }
        mouse.x = x; mouse.y = y;
        wakePhysics();
      };

      const clearMouse = () => setMouseParams(-1000, -1000, true);

      window.addEventListener('mousemove', (e) => setMouseParams(e.clientX, e.clientY));
      window.addEventListener('touchstart', (e) => setMouseParams(e.touches[0].clientX, e.touches[0].clientY, true), { passive: true });
      window.addEventListener('touchmove', (e) => setMouseParams(e.touches[0].clientX, e.touches[0].clientY), { passive: true });
      window.addEventListener('mouseleave', clearMouse);
      window.addEventListener('touchend', clearMouse);
      window.addEventListener('touchcancel', clearMouse);
      window.addEventListener('resize', () => { clearTimeout(resizeTimeout); resizeTimeout = setTimeout(resize, 150); });
      document.addEventListener('visibilitychange', () => {
        isVisible = document.visibilityState === 'visible';
        if (isVisible) wakePhysics(); else cancelAnimationFrame(animationFrameId);
      });

      const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)');
      if (prefersReducedMotion.matches) isSleeping = true;
      prefersReducedMotion.addEventListener('change', (e) => {
        if (e.matches) { isSleeping = true; clearMouse(); } else wakePhysics();
      });

      resize();
      animationFrameId = requestAnimationFrame(animate);

      const startApp = () => {
        document.body.classList.add('ready');
        if (!prefersReducedMotion.matches) {
          setTimeout(() => {
            const cx = width / 2, cy = height / 2;
            lastMouse.x = cx; lastMouse.y = cy - 150; mouse.x = cx; mouse.y = cy;
            wakePhysics();
            setTimeout(clearMouse, 200);
          }, 400);
        }
      };

      const fontPromise = document.fonts ? document.fonts.ready : Promise.resolve();
      const timeoutPromise = new Promise(resolve => setTimeout(resolve, 2500));
      Promise.race([fontPromise, timeoutPromise]).then(startApp).catch(startApp);
    })();
  </script>
</body>
</html>
